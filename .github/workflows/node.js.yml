# Tests every push and PR; pushes to main also deploy the site to GitHub
# Pages. Deployment publishes the build artifact straight from this workflow
# (Pages source: "GitHub Actions"), replacing the old flow of pushing to a
# gh-pages branch and letting GitHub's internal workflow deploy it.

name: Node.js CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # Allows re-deploying manually from the Actions tab, e.g. after a flaky
  # Pages outage, without pushing a new commit.
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: npm
    - run: npm ci
    - run: npm test
    - run: npm run build --if-present
    - name: Upload build for Pages deployment
      if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
      uses: actions/upload-pages-artifact@v5
      with:
        path: build

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Queue deployments instead of racing a still-running one.
    concurrency:
      group: pages
      cancel-in-progress: false

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5
      # "Deployment failed, try again later." is usually a transient GitHub
      # error; retry once before failing the run.
      continue-on-error: true
    - name: Retry deploy once
      if: steps.deployment.outcome == 'failure'
      uses: actions/deploy-pages@v5
