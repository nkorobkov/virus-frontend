# This workflow will do a clean install of node dependencies, build the source code and run tests
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Node.js CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-latest

    # Needed for gh-pages to push the build output to the gh-pages branch.
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: npm
    - run: npm ci
    - run: npm test
    - run: npm run build --if-present
    - name: deploy to gh pages
      if: github.ref == 'refs/heads/master'
      # gh-pages runs its own `git push`, so it needs an authenticated remote.
      # The built-in GITHUB_TOKEN authorizes the push to the gh-pages branch.
      run: npm run deploy -- -u "Virus War CI <nikita-ci@github.com>" -r "https://git:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
